# Goal: To deploy the built images from CI Steps once the CI Worklow is Succeeded

name: CD

on: 
    workflow_call:

permissions:
  contents: read
  packages: read

jobs:
    deploy:
        
        runs-on: self-hosted
        steps:
            - name: Code Checkout
              uses: actions/checkout@v7

            - name: Copy Example Env to main env
              run: cp .env.example .env

            # - name: Login to GHCR
            #   run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u adityamadhavi07 --password-stdin


            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            
            # - name: Docker Setup [Login]
            #   uses: docker/login-action@v3
            #   with:
            #     username: ${{ vars.DOCKERHUB_USERNAME }}
            #     password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Deploy the containers with Docker Compose
              run: |
                docker compose pull
                docker compose up -d
